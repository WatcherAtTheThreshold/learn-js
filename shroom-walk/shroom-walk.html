<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Running Shroom</title>
        <link rel="preload" as="image" href="shroom-walk1.png">
        <link rel="preload" as="image" href="shroom-walk2.png">
        <link rel="preload" as="image" href="shroom-walk3.png">
        <link rel="preload" as="image" href="shroom-walk4.png">
        <link rel="preload" as="image" href="shroom-walk5.png">
        <link rel="preload" as="image" href="shroom-walk6.png">
        <link rel="preload" as="image" href="shroom-walk7.png">
        <link rel="preload" as="image" href="shroom-walk8.png">
        <link rel="preload" as="image" href="shroom-walk9.png">
        <link rel="preload" as="image" href="shroom-walk10.png">
        <link rel="preload" as="image" href="shroom-walk11.png">
        <link rel="preload" as="image" href="shroom-walk12.png">
        <link rel="preload" as="image" href="shroom-walk13.png">
        <link rel="preload" as="image" href="shroom-walk14.png">
        <link rel="preload" as="image" href="shroom-walk15.png">
        <link rel="preload" as="image" href="shroom-walk16.png">
        <link rel="preload" as="image" href="shroom-turnaround1.png">
        <link rel="preload" as="image" href="shroom-turnaround2.png">
        <link rel="preload" as="image" href="shroom-turnaround3.png">
        <link rel="preload" as="image" href="shroom-turnaround4.png">
       
        <style>
              @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Lora:ital,wght@0,400;1,400&display=swap');

            body {
                font-family: 'Share Tech Mono', monospace;   
                background-color: #8c968c;
            }
            h1 {
                font-family: 'Press Start 2P', cursive;
                font-size: 44px;
            }
            p {
                font-size: 28px;
                margin-top: 30px;
            }
            .sub {
                font-size: 28px;
                margin-top: 10px;
            }
            .header {
                text-align: center;
                padding: 10px;
                height: 350px;
                width: 600px;
                margin-left: auto;
                margin-right: auto;
                background-color: #f3e8c8;
                color: #48494b;
                border: 2px solid #504d43;
                border-radius: 10px;    
            }
            .para {
                margin-top: 50px;
            }
            .bgImage {
                background-color:#f3e8c8;
                background-size: cover;
                background-position: center;
                height: 300px;
                width: 300px;
                margin-left: auto;
                margin-right: auto;
                margin-top: 20px;
                border: 5px solid #f3e8c8;
                border-radius: 10px;
                z-index: 4;
                position: relative;
             }
            .bgImage.zoomed {
                transform: scale(2.55);
                transition: transform 3s ease;
                transform-origin: center 65%;
                z-index: 5;
            }
           
            .heroImage {
                width: 256px;
                height: 256px;
                background-image: url('shroom-walk1.png');
                background-color: #5b6d72;
                background-position: center;
                background-size: contain;
                background-repeat: no-repeat;
                z-index: 3;
                margin-left: auto;
                margin-right: auto;
                margin-top:20px;
                border: 2px solid #48494b;
                border-radius: 10px;
                position: relative;
                cursor: pointer;
                transition: transform 0.3s ease;
                transform-origin: center center;
                overflow: visible;
                

            }
           
            
             .bgImage:hover {
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
                transition: box-shadow 0.3s ease-in-out;
            }
             .header:hover {
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
                transition: box-shadow 0.3s ease-in-out;
            }
            .heroBorder {
                width: 308px;
                height: 308px;
                background-color: transparent;
                border: 2px solid #48494b;
                border-radius: 10px;
                position: relative;
                margin-top: -285px;
                right: 6px;
                z-index: 2;
            }
            .field {
                width: 101%;
                min-height: 33vh;
                background-color: #f3e8c8;
                background-position: center;
                z-index: 1;
                
                margin-top: -120px;
                position: relative;
                left: 50%;
                transform: translateX(-50%);
                border: 2px solid #48494b;
                border-radius: 10px;
                pointer-events: none;
              

            }
            
        </style>
    </head>   
       <body>
            <div class="header">
                <h1>Running</h1> 
                <div class="para">
                    <p class="sub"><b>Run, Run, Run.</b></p>
                    <p><i>Click to zoom in and hear,</i></p>
                    <p class="sub">the music of the plants.</p>
                </div>
            </div>
            <div class="bgImage" id="zoomer">
                <div class="heroImage" id="blinker">

                </div>
                <div class="heroBorder">
                
                </div>  
            </div>
            <div class="field">

            </div>
            <audio id="plantSound" src="shroom-sound.mp3" ></audio>
           
        <script >
            const blinker = document.getElementById('blinker');
            const zoomer = document.getElementById('zoomer');
            const plantSound = document.getElementById('plantSound');
            const frames = [
            'shroom-walk1.png', 'shroom-walk2.png', 'shroom-walk3.png', 'shroom-walk4.png', 
            'shroom-walk5.png', 'shroom-walk6.png', 'shroom-walk7.png', 'shroom-walk8.png',
            'shroom-turnaround1.png', 'shroom-turnaround2.png','shroom-walk9.png', 'shroom-walk10.png', 
            'shroom-walk11.png', 'shroom-walk12.png', 'shroom-walk13.png', 'shroom-walk14.png',
            'shroom-walk15.png', 'shroom-walk16.png', 'shroom-turnaround3.png', 'shroom-turnaround4.png']; // Array of frame image URLs
            const delays = [200, 200, 200, 200, 200, 200, 200, 200, 500, 500, 200, 200, 200, 200, 200, 200, 200, 200, 500, 500]; // Delay for each frame in ms

            function playFrame(index) {
                    if (index >= frames.length) {
                        const delay = Math.floor(Math.random() * 2000) + 1000; // Random delay between 1s and 3s
                        setTimeout(() => playFrame(0), delay); // Restart animation after random delay
                        return;
                    }
                    blinker.style.backgroundImage = `url('${frames[index]}')`;
                    setTimeout(() => playFrame(index + 1), delays[index]);
            }

           

           

            playFrame(0);

            zoomer.addEventListener('click', () => {
                zoomer.classList.toggle('zoomed');

                if (zoomer.classList.contains('zoomed')) {
                    plantSound.play();
                } else {
                    plantSound.pause();
                }
            });

        
                
        </script>

      
        </body>
    
</html>
